server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Main location - SPA routing
    location / {
        try_files $uri $uri/ /index.html;

        # Important for SPA
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Assets - Allow updates but still cache somewhat
    location /assets {
        expires 1h;                    # Reduced from 1 year
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        # Remove "immutable" — this was the main culprit
    }

    # index.html should never be cached strongly
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Health check
    location /health {
        return 200 "OK\n";
    }
}