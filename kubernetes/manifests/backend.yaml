# Deployment: pulls awaistahseen009/riley-backend:0.0.01
# Injects all env vars from riley-secrets so the FastAPI app
# has access to DATABASE_URL, GROQ_API_KEY, REDIS_HOST etc.
# 2 replicas so if one pod crashes requests still get handled.
# Readiness probe on /health means ingress only sends traffic
# to pods that are actually ready — no cold-start errors.
#
# Service: ClusterIP on port 80 mapping to container port 8000.
# Ingress routes api.reporider.live → backend-service:80 → pod:8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: riley
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: awaistahseen009/riley-backend:v1.1.3
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: riley-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: riley
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000