services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    image: awaistahseen009/riley-backend:v1.0.6
    container_name: riley-backend
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    image: awaistahseen009/riley-backend:v1.0.6
    container_name: riley-worker
    command: ["python", "-m", "celery", "-A", "src.worker.celery_app", "worker", "-l", "info", "-P", "threads"]
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: awaistahseen009/riley-frontend:v1.0.2
    container_name: riley-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend